name: e2e (real Drive + rclone)

# Why this lives in a separate workflow from `ci.yml`:
#
# - Burns Drive API quota and shared scratch space. It runs on `push to main`
#   (merges), on tags (release validation), on pull requests targeting `main`,
#   and on demand (`workflow_dispatch`).
# - Needs real credentials (GitHub Secrets). GitHub does NOT expose secrets to
#   workflows triggered by pull requests from forks, so the e2e job will fail
#   for fork PRs (missing `AIR_DRIVE_E2E_*`). Only same-repo PRs get the
#   credentials.
# - Installs `rclone` from apt — the cost is acceptable here but pointless to
#   pay on the mocked CI runs.
#
# See `tests/e2e/README.md` for the setup procedure (GCP OAuth project, refresh
# token acquisition, secret names).

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

# Make sure two e2e runs against the same Drive account never overlap — they each
# claim a unique sub-folder via UUID but back-to-back runs share the quota budget,
# and the stale-folder sweep is more useful when runs are serialised.
concurrency:
  group: e2e-drive
  cancel-in-progress: false

jobs:
  e2e:
    name: cargo test --test rclone_drive -- --ignored
    runs-on: ubuntu-latest
    # A hung run is especially harmful here: the serialised `e2e-drive` concurrency
    # group (cancel-in-progress: false) means a stuck run blocks every queued run
    # behind it. Cap the whole job so a hang frees the queue in minutes, not hours.
    timeout-minutes: 30
    # Fork PRs don't get repo secrets (`AIR_DRIVE_E2E_*`), so the job can't run.
    # Skip it for them instead of failing; push/tag/dispatch are always same-repo.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    # Don't expose secrets to forks. The default permissions are already minimal,
    # but make the intent explicit.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone
          rclone version

      - name: Run e2e suite
        # Step-level cap targets the actual failure mode — the test process itself
        # hanging (e.g. an expired refresh token leaving a sync waiting forever).
        timeout-minutes: 20
        env:
          # Tokens.json content — a JSON blob holding the refresh token. NEVER
          # logged; the harness writes it to disk at 0600 inside a tempdir.
          AIR_DRIVE_E2E_TOKENS: ${{ secrets.AIR_DRIVE_E2E_TOKENS }}
          AIR_DRIVE_E2E_CLIENT_ID: ${{ secrets.AIR_DRIVE_E2E_CLIENT_ID }}
          AIR_DRIVE_E2E_CLIENT_SECRET: ${{ secrets.AIR_DRIVE_E2E_CLIENT_SECRET }}
          AIR_DRIVE_E2E_PARENT_FOLDER_ID: ${{ secrets.AIR_DRIVE_E2E_PARENT_FOLDER_ID }}
        # Wrap in coreutils `timeout` too: kills the test process with a clear exit
        # 124 (SIGTERM, then SIGKILL after 30s) so the failure reads as a timeout
        # rather than the step-level cap silently terminating the whole step.
        run: timeout --kill-after=30s 15m cargo test --test rclone_drive -- --ignored --nocapture

      # If the e2e suite fails partway through, the per-run Drive sub-folder may
      # leak. The next successful run sweeps anything older than 24 h
      # (`common::sweep_stale`), so we don't add explicit cleanup here.
