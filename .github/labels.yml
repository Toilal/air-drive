# GitHub issue labels for air-drive.
#
# This file is the source of truth for the repo's labels. The
# `.github/workflows/labels.yml` workflow syncs any change to this file
# (on push to `main`) into the repo's actual label set — including
# deletions, so a label removed here disappears on GitHub.
#
# To preview without applying: run the `Sync labels` workflow manually
# from the Actions tab with `dry-run = true`.
#
# Colors are 6-char hex without the leading `#`. Keep this file sorted by
# section, then by priority/weight inside each section.

# --- Priority ----------------------------------------------------------------
# Set exactly one priority/* label on every triaged issue. Untriaged issues
# keep the `triage` label (auto-applied by the issue templates).

- name: priority/critical
  color: "b60205"
  description: "Blocks usage, data loss, or corruption — fix immediately."

- name: priority/high
  color: "d93f0b"
  description: "Must land in the current release."

- name: priority/medium
  color: "fbca04"
  description: "Nice-to-have for the next release."

- name: priority/low
  color: "0e8a16"
  description: "Backlog — not urgent."

# --- Type --------------------------------------------------------------------
# Auto-applied by the issue templates; kept here so manual creations stay
# consistent.

- name: bug
  color: "d73a4a"
  description: "Something is broken."

- name: enhancement
  color: "a2eeef"
  description: "New feature or improvement request."

- name: triage
  color: "ededed"
  description: "Awaiting maintainer triage — remove once priority/* is set."

# --- Area --------------------------------------------------------------------
# Identifies the affected code area. Multiple area/* labels are fine when an
# issue crosses module boundaries. Uniform colour by design — the distinction
# lives in the name, not the hue.

- name: area/cli
  color: "1d76db"
  description: "src/cli — commands, argument parsing, CLI UX."

- name: area/daemon
  color: "1d76db"
  description: "src/daemon — runtime, lifecycle, dispatcher, in-flight ops."

- name: area/watch
  color: "1d76db"
  description: "src/watch — notify watcher, debounce, ignore patterns."

- name: area/drive-api
  color: "1d76db"
  description: "src/drive — OAuth, HTTP client, changes.list poller, metadata."

- name: area/engine
  color: "1d76db"
  description: "src/engine — SyncEngine trait, RcloneEngine, staging."

- name: area/reconcile
  color: "1d76db"
  description: "src/reconcile — apply_local/remote, fingerprints, conflict resolution."

- name: area/state
  color: "1d76db"
  description: "src/state — SQLite schema, migrations, items/ops/cursor/mapping."

- name: area/ui
  color: "1d76db"
  description: "Tauri front-end and tray UI (future)."

- name: area/docs
  color: "1d76db"
  description: "README, CLAUDE.md, doc-comments, examples."

- name: area/ci
  color: "1d76db"
  description: ".github/workflows, install.sh, packaging, release tooling."

# --- Contribution friendliness ----------------------------------------------

- name: good first issue
  color: "7057ff"
  description: "Good entry point for new contributors."

- name: help wanted
  color: "008672"
  description: "Maintainers welcome external contributions on this one."
